<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>الحلقة 1</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cairo',sans-serif;
    }

    body{
      background:#000;
      color:#fff;
      padding:20px;
      min-height:100vh;
    }

    .container{
      width:100%;
      max-width:1100px;
      margin:auto;
    }

    .title{
      text-align:center;
      font-size:42px;
      font-weight:800;
      margin-bottom:30px;
    }

    .servers{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:15px;
      margin-bottom:25px;
      flex-wrap:wrap;
    }

    .server-btn{
      background:#111;
      color:#fff;
      border:2px solid #222;
      padding:14px 28px;
      border-radius:14px;
      cursor:pointer;
      font-size:18px;
      font-weight:700;
      transition:0.3s;
    }

    .server-btn:hover{
      background:#fff;
      color:#000;
    }

    .server-btn.active{
      background:#fff;
      color:#000;
    }

    .player-wrapper{
      position:relative;
      width:100%;
      padding-top:56.25%;
      overflow:hidden;
      border-radius:20px;
      background:#111;
      border:2px solid #222;
      box-shadow:0 0 25px rgba(255,255,255,0.05);
      margin-bottom:40px;
    }

    .player{
      display:none;
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .player.active{
      display:flex;
    }

    .player video{
      width:100%;
      height:100%;
      background:#000;
    }

    .download-title{
      text-align:center;
      font-size:28px;
      font-weight:800;
      margin-bottom:25px;
    }

    .downloads{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:20px;
      margin-bottom:50px;
    }

    .download-btn{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      text-decoration:none;
      background:#111;
      color:#fff;
      padding:18px;
      border-radius:16px;
      border:2px solid #222;
      font-size:20px;
      font-weight:700;
      transition:0.3s;
      overflow:hidden;
    }

    .download-btn:hover{
      background:#fff;
      color:#000;
      transform:translateY(-4px);
    }

    .best-badge{
      position:absolute;
      top:10px;
      left:10px;
      background:#ffd500;
      color:#000;
      padding:4px 10px;
      border-radius:8px;
      font-size:13px;
      font-weight:800;
    }

    .telegram-box{
      display:flex;
      justify-content:center;
      margin-top:10px;
      margin-bottom:30px;
    }

    .telegram-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-decoration:none;
      background:linear-gradient(135deg,#0088cc,#00bfff);
      color:#fff;
      padding:18px 35px;
      border-radius:18px;
      font-size:22px;
      font-weight:800;
      transition:0.3s;
      box-shadow:0 0 25px rgba(0,191,255,0.4);
    }

    .telegram-btn:hover{
      transform:translateY(-5px) scale(1.03);
      box-shadow:0 0 35px rgba(0,191,255,0.7);
    }

    .telegram-icon{
      font-size:28px;
    }

  </style>
</head>

<body>

<div class="container">

<h1 class="title">الحلقة 1</h1>

<div class="servers">

<button class="server-btn active" onclick="showPlayer(1,this)">
مشغل مشاهدة 1
</button>

<button class="server-btn" onclick="showPlayer(2,this)">

</div>

<div class="player-wrapper">

<div class="player active" id="player1">

<video
controls
controlsList="nodownload"
disablePictureInPicture
playsinline
width="100%"
height="100%"
>

<source src="https://files.catbox.moe/qvibef.mp4" type="video/mp4">

</video>

</div>

<div class="player" id="player2">

<video
controls
controlsList="nodownload"
disablePictureInPicture
playsinline
width="100%"
height="100%"
>

<source src="https://e2.urleecher.com/d/ffsn37asshzhz54nfxvq3wdzwyeig5e3klwryus7qpzyq6fljifteyyskmf2h36pdrypsnodo5k7pfjxhpa7s/OK%20K.O.!%20Let's%20Be%20Heroes%20S1%20Ep1.mp4" type="video/mp4">

</video>

</div>

</div>

<h2 class="download-title">التحميل</h2>

<div class="downloads">

<a class="download-btn"
href="https://frdl.io/tgtpywz0y72q/OK_K.O.!_Let's_Be_Heroes_S1_Ep1.mp4.html"
target="_blank">

<span class="best-badge">الأفضل</span>

تحميل مباشر

</a>

</div>

<div style="
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:40px;
">

<a href="player2.html" style="
text-decoration:none;
background:#111;
color:#fff;
padding:16px 28px;
border-radius:16px;
border:2px solid #222;
font-size:20px;
font-weight:700;
transition:0.3s;
display:flex;
align-items:center;
justify-content:center;
min-width:220px;
">

الحلقة التالية ➡

</a>

</div>

<div class="telegram-box">

<a class="telegram-btn"
href="https://t.me/CARTOONYB"
target="_blank">

<span class="telegram-icon">📢</span>

تابعنا على تيليجرام عشان تعرف كل جديد

</a>

</div>

</div>

<script>

function showPlayer(playerNumber,button){

document.querySelectorAll('.player').forEach(player=>{
player.classList.remove('active');
});

document.querySelectorAll('.server-btn').forEach(btn=>{
btn.classList.remove('active');
});

document.getElementById('player'+playerNumber).classList.add('active');

button.classList.add('active');

}

</script>

<script src="https://quge5.com/88/tag.min.js"
data-zone="241388"
async

</script>

</body>
</html>
