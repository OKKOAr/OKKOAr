<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OK K.O.! Let's Be Heroes</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Cairo',sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#0d0d0d;
  color:#fff;
  overflow-x:hidden;
  width:100%;
}

img{
  max-width:100%;
  height:auto;
  display:block;
}

a{
  text-decoration:none;
}

/* HERO */

.hero{
  width:100%;
  min-height:100vh;
  position:relative;
  overflow:hidden;

  background:
  linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
  linear-gradient(to left,rgba(0,149,255,.30),rgba(0,0,0,.10)),
  url('https://i.postimg.cc/tJNMbnKm/download-(2).jpg');

  background-size:cover;
  background-position:center;
}

.hero-content{
  position:relative;
  z-index:2;
  width:100%;
  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:40px;

  padding:0 120px;
}

.hero-text{
  max-width:560px;
  width:100%;
  animation:fadeUp 1.2s ease;
}

.hero-text h1{
  font-size:clamp(30px,5vw,52px);
  font-weight:900;
  margin-bottom:12px;
  line-height:1.2;
  color:#fff;

  text-shadow:
  0 0 10px rgba(255,255,255,.25),
  0 0 25px rgba(17,102,220,.35);

  animation:glow 3s infinite alternate;
}

.hero-text h2{
  font-size:clamp(34px,6vw,62px);
  font-weight:900;
  margin-bottom:25px;
  line-height:1.2;

  background:linear-gradient(90deg,#fff,#4da3ff,#1166dc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:gradientMove 6s linear infinite;
  background-size:300%;
}

.hero-text h3{
  font-size:clamp(20px,4vw,36px);
  margin-bottom:35px;
  font-weight:700;
  color:#d9e7ff;

  letter-spacing:2px;
}

.line{
  width:120px;
  height:4px;
  border-radius:50px;
  background:linear-gradient(to right,#fff,#1166dc);
  margin-bottom:35px;

  animation:lineGlow 2s infinite alternate;
}

.hero-text p{
  font-size:clamp(16px,2vw,23px);
  line-height:2.1;
  color:#f1f1f1;
  font-weight:700;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);

  padding:22px;
  border-radius:18px;

  backdrop-filter:blur(10px);

  box-shadow:
  0 0 25px rgba(0,0,0,.25);

  animation:fadeIn 2s ease;
}

.hero-buttons{
  display:flex;
  gap:15px;
  margin-top:25px;
  margin-bottom:80px;
  flex-wrap:wrap;
  position:relative;
  z-index:20;
}

.hero-btn{
  padding:14px 30px;
  border-radius:14px;
  font-size:18px;
  font-weight:800;
  transition:.35s;
}

.watch-btn{
  background:#1166dc;
  color:#fff;

  box-shadow:
  0 0 20px rgba(17,102,220,.45);
}

.watch-btn:hover{
  transform:translateY(-5px) scale(1.05);
  box-shadow:
  0 0 35px rgba(17,102,220,.75);
}

.info-btn{
  border:2px solid rgba(255,255,255,.2);
  color:#fff;
  backdrop-filter:blur(6px);
}

.info-btn:hover{
  background:rgba(255,255,255,.08);
  transform:translateY(-5px);
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(50px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes fadeIn{
  from{
    opacity:0;
  }
  to{
    opacity:1;
  }
}

@keyframes glow{
  from{
    text-shadow:
    0 0 10px rgba(255,255,255,.2),
    0 0 20px rgba(17,102,220,.2);
  }

  to{
    text-shadow:
    0 0 15px rgba(255,255,255,.45),
    0 0 35px rgba(17,102,220,.55);
  }
}

@keyframes lineGlow{
  from{
    box-shadow:0 0 5px rgba(255,255,255,.2);
  }

  to{
    box-shadow:0 0 20px rgba(17,102,220,.7);
  }
}

@keyframes gradientMove{
  0%{
    background-position:0%;
  }

  100%{
    background-position:300%;
  }
}

.hero-logo{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero-logo img{
  width:min(560px,100%);
  filter:drop-shadow(0 0 15px rgba(0,0,0,.8));
}

/* WAVE */

.wave{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  overflow:hidden;
  line-height:0;
  z-index:1;
}

.wave svg{
  width:100%;
  height:140px;
  display:block;
}

.wave .shape-fill{
  fill:#1166dc;
}

/* SEASON */

.season{
  background:#1166dc;
  padding:60px 25px 90px;
  width:100%;
}

.season-title{
  text-align:center;
  font-size:clamp(38px,7vw,85px);
  font-weight:900;
  margin-bottom:45px;
}

/* EPISODES GRID */

.episodes{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  width:100%;
}

/* ✨ NEW CARD DESIGN ✨ */

.card{
  position:relative;
  overflow:hidden;
  background:rgba(0,0,0,0.6);
  border-radius:16px;
  transition:all .4s ease;
  cursor:pointer;
  width:100%;

  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(6px);
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(17,102,220,0.4),transparent);
  opacity:0;
  transition:.4s;
}

.card:hover::before{
  opacity:1;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 15px 35px rgba(0,0,0,0.6);
}

.card img{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  transition:transform .5s ease;
}

.card:hover img{
  transform:scale(1.08);
}

.card-title{
  position:absolute;
  bottom:0;
  width:100%;
  padding:14px;

  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  text-align:center;

  font-size:clamp(14px,2vw,18px);
  font-weight:700;
  color:#fff;

  transition:.3s;
}

.card:hover .card-title{
  background:linear-gradient(to top, rgba(17,102,220,0.9), transparent);
}

/* SCROLLBAR */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-thumb{
  background:#1166dc;
}

::-webkit-scrollbar-track{
  background:#111;
}

/* RESPONSIVE */

@media(max-width:900px){

  .hero{
    min-height:auto;
    padding:40px 0 120px;
  }

  .hero-content{

    flex-direction:column-reverse;
    justify-content:center;
    align-items:center;

    text-align:center;

    min-height:auto;

    padding:20px 20px 0;

    gap:10px;
  }

  .hero-text{
    max-width:100%;
  }

  .hero-text h1{
    font-size:30px;
  }

  .hero-text h2{
    font-size:34px;
  }

  .hero-text h3{
    font-size:20px;
    margin-bottom:20px;
  }

  .hero-text p{
    font-size:15px;
    line-height:1.9;
    padding:18px;
  }

  .line{
    margin:0 auto 25px;
  }

  .hero-buttons{

    margin-top:25px;
    margin-bottom:0;

    width:100%;

    display:flex;
    flex-direction:column;

    gap:15px;
  }

  .hero-btn{
    width:100%;
    text-align:center;

    padding:16px;

    font-size:20px;
  }

  .hero-logo img{
    width:90%;
    max-width:320px;
  }

  .wave svg{
    height:100px;
  }

  .season{
    padding-top:40px;
  }
.wave{
  bottom:-1px;
}

.wave svg{
  height:70px;
}

.hero{
  padding-bottom:70px;
}
}

</style>

</head>
